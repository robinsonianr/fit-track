version: '3.8'

services:
  backend:
    build:
      context: ./fit-track
      dockerfile: Dockerfile
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      HTTP_HOST: host.docker.internal
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ~/.aws:/root/.aws:ro
    networks:
      - fitness
    external_links:
      - fit-db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./fit-track-ui/react
      dockerfile: Dockerfile
      args:
        api_base_url: http://localhost:8080
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    networks:
      - fitness
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  fitness:
    driver: bridge