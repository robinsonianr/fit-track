spring:
  datasource:
    url: jdbc:h2:mem:fit-track;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS fit_tracker;
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: false
    generate-ddl: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        ddl-auto: create-drop
        format_sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.robinsonir.fittrack: INFO
    org.springdoc: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  show-actuator: false